<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Finance AI Agent</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-container">
                <div class="logo">₹</div>
                <h1>Smart Finance Agent</h1>
            </div>
            <p class="subtitle">Your personal AI financial advisor</p>
        </header>
        
        <main class="chat-container">
            <div class="chat-history" id="chat-history">
                <div class="message ai-message">
                    <div class="avatar">AI</div>
                    <div class="content">Hello! I am your practical financial advisor. How can I help you manage your finances today?</div>
                </div>
            </div>
            
            <div class="input-area">
                <textarea id="user-input" placeholder="e.g. I earn ₹50,000 per month, how should I save?" rows="1"></textarea>
                <button id="send-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </main>
    </div>
    
    <!-- Marked.js for rendering markdown from the agent -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
